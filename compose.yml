services:
  postgres:
    image: postgres:16-alpine
    container_name: kite-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-postgres}
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
    ports:
      - "15432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-postgres}",
        ]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: kite-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "16379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  meilisearch:
    image: getmeili/meilisearch:v1.12
    container_name: kite-meilisearch
    restart: unless-stopped
    environment:
      MEILI_MASTER_KEY: ${MEILI_MASTER_KEY:-aMasterKey}
      MEILI_NO_ANALYTICS: "true"
    ports:
      - "17700:7700"
    volumes:
      - meili_data:/meili_data
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--no-verbose",
          "--tries=1",
          "--spider",
          "http://127.0.0.1:7700/health",
        ]
      interval: 30s
      timeout: 10s
      retries: 5

  market-runtime:
    build:
      context: ./market-runtime
      dockerfile: Dockerfile
      target: production
    container_name: kite-market-runtime
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${DB_NAME:-postgres}
      DB_USER: ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-postgres}
      REDIS_URL: redis://redis:6379/0
      MARKET_RUNTIME_HTTP_ADDR: :8780
      MARKET_RUNTIME_HTTP_URL: http://market-runtime:8780
      MARKET_RUNTIME_ENABLED: "true"
    ports:
      - "18780:8780"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--no-verbose",
          "--tries=1",
          "--spider",
          "http://127.0.0.1:8780/healthz",
        ]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 15s

  finance-app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: kite-app
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${DB_NAME:-postgres}
      DB_USER: ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-postgres}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_URL: redis://redis:6379/0
      MEILI_URL: http://meilisearch:7700
      MARKET_RUNTIME_ENABLED: "true"
      MARKET_RUNTIME_HTTP_URL: http://market-runtime:8780
      PYTHONUNBUFFERED: "1"
    ports:
      - "18777:8777"
    command:
      - sh
      - -c
      - alembic upgrade head && uvicorn main:app --host 0.0.0.0 --port 8777 --proxy-headers --forwarded-allow-ips '*'
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      meilisearch:
        condition: service_healthy
      market-runtime:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8777/').read()",
        ]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: production
    container_name: kite-frontend
    restart: unless-stopped
    environment:
      API_BASE_URL: http://finance-app:8777
      MARKET_RUNTIME_URL: http://market-runtime:8780
    ports:
      - "15173:80"
    depends_on:
      finance-app:
        condition: service_healthy
      market-runtime:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--no-verbose",
          "--tries=1",
          "--spider",
          "http://127.0.0.1/",
        ]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s

  frontend-next:
    build:
      context: ./frontend-next
      dockerfile: Dockerfile
      target: production
    container_name: kite-frontend-next
    restart: unless-stopped
    environment:
      NODE_ENV: production
      BACKEND_INTERNAL_URL: http://finance-app:8777
      MARKET_RUNTIME_URL: http://market-runtime:8780
      NEXT_PUBLIC_API_BASE_URL: ""
      NEXT_PUBLIC_MARKET_RUNTIME_URL: ""
    ports:
      - "13000:3000"
    depends_on:
      finance-app:
        condition: service_healthy
      market-runtime:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--no-verbose",
          "--tries=1",
          "--spider",
          "http://127.0.0.1:3000",
        ]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s

volumes:
  postgres_data:
  redis_data:
  meili_data:
