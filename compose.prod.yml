services:
  finance-app:
    build: .
    container_name: kite-app
    expose:
      - "8777"
    env_file:
      - .env
    command:
      - uvicorn
      - main:app
      - --host
      - 0.0.0.0
      - --port
      - "8777"
      - --proxy-headers
      - --forwarded-allow-ips
      - "*"
    restart: always
    networks:
      - db-net
      - caddy-net
    depends_on:
      - redis
      - meilisearch
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8777/').read()"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s

  frontend:
    build: ./frontend
    container_name: kite-frontend
    expose:
      - "80"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - db-net
      - caddy-net
    depends_on:
      - finance-app
    restart: always

  meilisearch:
    image: getmeili/meilisearch:latest
    volumes:
      - ./meili_data:/data.ms
    expose:
      - "7700"
    env_file:
      - .env
    command: ["meilisearch", "--master-key=${MEILI_MASTER_KEY}"]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:7700/health"]
      interval: 30s
      timeout: 10s
      retries: 5
    networks:
      - db-net
      - caddy-net
    restart: always

  redis:
    image: "redis:alpine"
    container_name: kite-redis
    expose:
      - "6379"
    volumes:
      - ./redis_data:/data
    networks:
      - db-net
      - caddy-net
    restart: always

networks:
  db-net:
    external: true
  caddy-net:
    external: true
