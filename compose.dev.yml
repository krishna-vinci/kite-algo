services:
  postgres:
    image: postgres:16-alpine
    container_name: kite-postgres-dev
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-postgres}
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
    ports:
      - "15432:5432"
    volumes:
      - postgres_dev_data:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-postgres}",
        ]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: kite-redis-dev
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "16379:6379"
    volumes:
      - redis_dev_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  meilisearch:
    image: getmeili/meilisearch:v1.12
    container_name: kite-meilisearch-dev
    restart: unless-stopped
    environment:
      MEILI_MASTER_KEY: ${MEILI_MASTER_KEY:-aMasterKey}
      MEILI_NO_ANALYTICS: "true"
    ports:
      - "17700:7700"
    volumes:
      - meili_dev_data:/meili_data
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--no-verbose",
          "--tries=1",
          "--spider",
          "http://127.0.0.1:7700/health",
        ]
      interval: 30s
      timeout: 10s
      retries: 5

  market-runtime:
    build:
      context: ./market-runtime
      dockerfile: Dockerfile
      target: dev
    container_name: kite-market-runtime-dev
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${DB_NAME:-postgres}
      DB_USER: ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-postgres}
      REDIS_URL: redis://redis:6379/0
      MARKET_RUNTIME_HTTP_ADDR: :8780
      MARKET_RUNTIME_HTTP_URL: http://market-runtime:8780
      MARKET_RUNTIME_ENABLED: "true"
    ports:
      - "18780:8780"
    volumes:
      - ./market-runtime:/app
    command:
      - sh
      - -c
      - go mod download && go run ./cmd/market-runtime
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--no-verbose",
          "--tries=1",
          "--spider",
          "http://127.0.0.1:8780/healthz",
        ]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 15s

  finance-app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: kite-app-dev
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${DB_NAME:-postgres}
      DB_USER: ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-postgres}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_URL: redis://redis:6379/0
      MEILI_URL: http://meilisearch:7700
      MARKET_RUNTIME_ENABLED: "true"
      MARKET_RUNTIME_HTTP_URL: http://market-runtime:8780
      PYTHONUNBUFFERED: "1"
    ports:
      - "18777:8777"
    volumes:
      - ./:/app
    command:
      - sh
      - -c
      - alembic upgrade head && uvicorn main:app --host 0.0.0.0 --port 8777 --reload
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      meilisearch:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8777/').read()",
        ]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: dev
    container_name: kite-frontend-dev
    restart: unless-stopped
    ports:
      - "15173:5173"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    environment:
      NODE_ENV: development
      VITE_API_TARGET: http://finance-app:8777
      VITE_MARKET_RUNTIME_TARGET: http://market-runtime:8780
    command:
      - npm
      - run
      - dev
      - --
      - --host
      - 0.0.0.0
      - --port
      - "5173"
    depends_on:
      finance-app:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--no-verbose",
          "--tries=1",
          "--spider",
          "http://127.0.0.1:5173",
        ]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s

  frontend-next:
    build:
      context: ./frontend-next
      dockerfile: Dockerfile
      target: dev
    container_name: kite-frontend-next-dev
    restart: unless-stopped
    ports:
      - "13000:3000"
    volumes:
      - ./frontend-next:/app
      - frontend_next_node_modules:/app/node_modules
    environment:
      NODE_ENV: development
      BACKEND_INTERNAL_URL: http://finance-app:8777
      NEXT_PUBLIC_API_BASE_URL: ""
      NEXT_PUBLIC_MARKET_RUNTIME_URL: http://market-runtime:8780
      WATCHPACK_POLLING: "true"
    command:
      - npm
      - run
      - dev
      - --
      - --hostname
      - 0.0.0.0
      - --port
      - "3000"
    depends_on:
      finance-app:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--no-verbose",
          "--tries=1",
          "--spider",
          "http://127.0.0.1:3000",
        ]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s

volumes:
  postgres_dev_data:
  redis_dev_data:
  meili_dev_data:
  frontend_node_modules:
  frontend_next_node_modules:
